name: Daily UPSC Digest Bot

on:
  # Allows you to click a button in the "Actions" tab to run it immediately
  workflow_dispatch: 

  # Automatically runs every day at 01:30 UTC (7:00 AM IST)
  schedule:
    - cron: '30 1 * * *'

jobs:
  run-ai-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests

      - name: Execute UPSC Digest Script
        # This section maps your GitHub Secrets to the script's Environment Variables
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python upsc_daily_digest.py